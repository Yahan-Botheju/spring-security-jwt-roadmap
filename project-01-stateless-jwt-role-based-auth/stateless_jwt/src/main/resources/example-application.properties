spring.application.name=stateless_jwt
server.port=5000
spring.datasource.url=jdbc:postgresql://localhost:5432/v1_task_manager_jwt_db
#DOCKER LOCAL SETUP
#spring.datasource.url=jdbc:postgresql://host.docker.internal:5432/v1_task_managet_jwt_db
spring.datasource.username=postgres
spring.datasource.password=YOUR_DB_PASSWORD


# Hibernate config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Corrected Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.session.jdbc.initialize-schema=always
spring.session.store-type=jdbc
spring.session.jdbc.platform=postgresql

#__KEYS__
application.security.jwt.secret-key=__YOUR_SECRECT_KEY__ (256-Bit long key is required)
