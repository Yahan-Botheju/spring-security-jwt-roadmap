spring.application.name=stateful_jwt_and_refresh_token_rotation
server.port=5000
spring.datasource.url=jdbc:postgresql://localhost:5432/token_rotation_db
#DOCKER LOCAL SETUP
#spring.datasource.url=jdbc:postgresql://host.docker.internal:5432/token_rotation_db
spring.datasource.username=postgres
spring.datasource.password=__YOUR_DB_PASSWORD__


# Hibernate config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Corrected Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.session.jdbc.initialize-schema=always
spring.session.store-type=jdbc
spring.session.jdbc.platform=postgresql

